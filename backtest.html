<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backtest — Trading Journal</title>
<link rel="stylesheet" href="styles.css">
<script src="config.js"></script>
<style>
  :root { --accent: #9382fa; }

  .rr-display {
    background: color-mix(in srgb, var(--accent) 10%, var(--bg3));
    border: 1px solid var(--accent);
    border-radius: var(--radius-sm);
    padding: 12px 20px;
    text-align: center;
    font-family: var(--font-head);
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--accent);
  }

  .pnl-auto {
    font-family: var(--font-head);
    font-size: 1.2rem;
    font-weight: 700;
  }
</style>
</head>
<body>
<div id="navbarContainer"></div>

<main class="container">

  <div class="page-header">
    <h1>🔬 Backtest</h1>
    <p>Журнал бэктест-сделок</p>
  </div>

  <!-- PAGE TABS -->
  <div class="tab-bar" style="max-width:400px">
    <button class="tab-item active" onclick="showTab('formView', this)">📝 Форма</button>
    <button class="tab-item" onclick="showTab('analyticsView', this)">📊 Analytics</button>
  </div>

  <!-- FORM VIEW -->
  <div id="formView" class="tab-view active">

    <!-- Entry / Close tabs -->
    <div class="tab-bar">
      <button class="tab-item active" id="tabEntryBtn" onclick="showFormTab('entryTab', this)">📈 Entry (Вход)</button>
      <button class="tab-item" id="tabCloseBtn" onclick="showFormTab('closeTab', this)">📉 Close (Закрытие)</button>
    </div>

    <!-- ===== ENTRY TAB ===== -->
    <div id="entryTab" class="tab-content active">

      <!-- Common -->
      <div class="form-section accent-border">
        <div class="section-title">📅 Общее</div>
        <div class="form-grid form-grid-3">
          <div class="form-group">
            <label>День недели <span class="required">*</span></label>
            <select id="e_day">
              <option value="">— выберите —</option>
              <option>Понедельник</option><option>Вторник</option><option>Среда</option>
              <option>Четверг</option><option>Пятница</option><option>Суббота</option><option>Воскресенье</option>
            </select>
          </div>
          <div class="form-group">
            <label>Время (дата и время) <span class="required">*</span></label>
            <input type="datetime-local" id="e_time">
          </div>
          <div class="form-group">
            <label>Сессия</label>
            <div class="radio-group" id="e_session_group">
              <label class="radio-option"><input type="radio" name="e_session" value="Азия"> Азия</label>
              <label class="radio-option"><input type="radio" name="e_session" value="Лондон"> Лондон</label>
              <label class="radio-option"><input type="radio" name="e_session" value="США"> США</label>
              <label class="radio-option"><input type="radio" name="e_session" value="Россия"> Россия</label>
              <label class="radio-option">
                <input type="radio" name="e_session" value="Другое"> Другое:
                <input type="text" class="other-input" id="e_session_other" placeholder="Укажите">
              </label>
            </div>
          </div>
        </div>
      </div>

      <!-- Structure & Setup -->
      <div class="form-section accent-border">
        <div class="section-title">📊 Структура и паттерн</div>
        <div class="form-grid form-grid-3">

          <div class="form-group">
            <label>Структура <span class="required">*</span></label>
            <div class="radio-group" id="e_structure_group">
              <label class="radio-option"><input type="radio" name="e_structure" value="Тренд"> Тренд</label>
              <label class="radio-option"><input type="radio" name="e_structure" value="Контртренд"> Контртренд</label>
              <label class="radio-option"><input type="radio" name="e_structure" value="Боковик"> Боковик</label>
            </div>
          </div>

          <div class="form-group">
            <label>HTF POI <span class="required">*</span></label>
            <div class="radio-group" id="e_htfpoi_group">
              <label class="radio-option"><input type="radio" name="e_htfpoi" value="B2S ↓"> B2S ↓</label>
              <label class="radio-option"><input type="radio" name="e_htfpoi" value="FVG ↑"> FVG ↑</label>
              <label class="radio-option"><input type="radio" name="e_htfpoi" value="FVG ↓"> FVG ↓</label>
              <label class="radio-option"><input type="radio" name="e_htfpoi" value="IFVG"> IFVG</label>
              <label class="radio-option"><input type="radio" name="e_htfpoi" value="LIQ"> LIQ</label>
              <label class="radio-option"><input type="radio" name="e_htfpoi" value="S2B ↑"> S2B ↑</label>
              <label class="radio-option"><input type="radio" name="e_htfpoi" value="OB ↑"> OB ↑</label>
              <label class="radio-option"><input type="radio" name="e_htfpoi" value="OB ↓"> OB ↓</label>
              <label class="radio-option"><input type="radio" name="e_htfpoi" value="SMT"> SMT</label>
            </div>
          </div>

          <div class="form-group">
            <label>LTF Entry <span class="required">*</span></label>
            <div class="radio-group" id="e_ltfentry_group">
              <label class="radio-option"><input type="radio" name="e_ltfentry" value="B2S ↓"> B2S ↓</label>
              <label class="radio-option"><input type="radio" name="e_ltfentry" value="FVG ↑"> FVG ↑</label>
              <label class="radio-option"><input type="radio" name="e_ltfentry" value="FVG ↓"> FVG ↓</label>
              <label class="radio-option"><input type="radio" name="e_ltfentry" value="IDM"> IDM</label>
              <label class="radio-option"><input type="radio" name="e_ltfentry" value="IFVG"> IFVG</label>
              <label class="radio-option"><input type="radio" name="e_ltfentry" value="LIQ"> LIQ</label>
              <label class="radio-option"><input type="radio" name="e_ltfentry" value="MKT"> MKT</label>
              <label class="radio-option"><input type="radio" name="e_ltfentry" value="S2B ↑"> S2B ↑</label>
              <label class="radio-option"><input type="radio" name="e_ltfentry" value="OB ↑"> OB ↑</label>
              <label class="radio-option"><input type="radio" name="e_ltfentry" value="OB ↓"> OB ↓</label>
            </div>
          </div>
        </div>
      </div>

      <!-- Ticker + Prices -->
      <div class="form-section accent-border">
        <div class="section-title">📌 Тикер и цены</div>
        <div class="form-grid form-grid-4">

          <div class="form-group">
            <label>Тикер <span class="required">*</span></label>
            <div class="radio-group" id="e_ticker_group">
              <label class="radio-option"><input type="radio" name="e_ticker" value="XAU"> XAU</label>
              <label class="radio-option"><input type="radio" name="e_ticker" value="XAG"> XAG</label>
              <label class="radio-option"><input type="radio" name="e_ticker" value="SPY"> SPY</label>
              <label class="radio-option"><input type="radio" name="e_ticker" value="NASD"> NASD</label>
              <label class="radio-option"><input type="radio" name="e_ticker" value="GER"> GER</label>
              <label class="radio-option"><input type="radio" name="e_ticker" value="EUR"> EUR</label>
              <label class="radio-option"><input type="radio" name="e_ticker" value="BTC"> BTC</label>
              <label class="radio-option"><input type="radio" name="e_ticker" value="ETH"> ETH</label>
              <label class="radio-option">
                <input type="radio" name="e_ticker" value="Другое"> Другое:
                <input type="text" class="other-input" id="e_ticker_other" placeholder="Тикер">
              </label>
            </div>
          </div>

          <div class="form-group">
            <label>BoS</label>
            <div class="radio-group">
              <label class="radio-option"><input type="radio" name="e_bos" value="15M"> 15M</label>
              <label class="radio-option"><input type="radio" name="e_bos" value="1H"> 1H</label>
              <label class="radio-option"><input type="radio" name="e_bos" value="4H"> 4H</label>
              <label class="radio-option"><input type="radio" name="e_bos" value="1D"> 1D</label>
              <label class="radio-option">
                <input type="radio" name="e_bos" value="Другое"> Другое:
                <input type="text" class="other-input" id="e_bos_other" placeholder="Укажите">
              </label>
            </div>
          </div>

          <div class="form-group">
            <label>Stop Loss <span class="required">*</span></label>
            <input type="number" id="e_sl" placeholder="0.00" step="any" oninput="calcRR()">
          </div>

          <div class="form-group">
            <label>Entry <span class="required">*</span></label>
            <input type="number" id="e_entry" placeholder="0.00" step="any" oninput="calcRR()">
          </div>

          <div class="form-group">
            <label>Target <span class="required">*</span></label>
            <input type="number" id="e_target" placeholder="0.00" step="any" oninput="calcRR()">
          </div>

          <div class="form-group">
            <label>Risk Reward (RR) — авто</label>
            <div class="rr-display" id="e_rr_display">—</div>
            <input type="hidden" id="e_rr">
          </div>

          <div class="form-group" style="grid-column:1/-1">
            <label>Направление — авто</label>
            <div id="e_direction_badge" style="margin-top:4px">
              <span class="direction-badge" style="background:var(--bg3);color:var(--text2);border:1px solid var(--border)">— Ожидание данных —</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Charts -->
      <div class="form-section accent-border">
        <div class="section-title">📸 Графики</div>
        <div class="form-grid form-grid-2">
          <div class="form-group">
            <label>HTF График <span class="required">*</span></label>
            <input type="text" id="e_htf_chart" placeholder="Ссылка на скриншот HTF">
          </div>
          <div class="form-group">
            <label>LTF График <span class="required">*</span></label>
            <input type="text" id="e_ltf_chart" placeholder="Ссылка на скриншот LTF">
          </div>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-secondary" onclick="resetEntryForm()">🔄 Сбросить Entry</button>
        <button class="btn btn-primary btn-lg" onclick="submitBacktestEntry()">
          <span id="entrySubmitText">💾 Сохранить Entry</span>
          <span id="entrySpinner" style="display:none" class="spinner"></span>
        </button>
      </div>

    </div> <!-- /entryTab -->

    <!-- ===== CLOSE TAB ===== -->
    <div id="closeTab" class="tab-content">

      <div class="form-section accent-border">
        <div class="section-title">📅 Закрытие сделки</div>
        <div class="form-grid form-grid-3">
          <div class="form-group">
            <label>Выход (дата и время)</label>
            <input type="datetime-local" id="c_exit_time">
          </div>
          <div class="form-group">
            <label>Результат</label>
            <div class="radio-group" id="c_result_group">
              <label class="radio-option"><input type="radio" name="c_result" value="Тейк"> Тейк</label>
              <label class="radio-option"><input type="radio" name="c_result" value="Стоп"> Стоп</label>
              <label class="radio-option"><input type="radio" name="c_result" value="Руками"> Руками</label>
              <label class="radio-option">
                <input type="radio" name="c_result" value="Другое"> Другое:
                <input type="text" class="other-input" id="c_result_other" placeholder="Укажите">
              </label>
            </div>
          </div>
          <div class="form-group">
            <label>Closed Price</label>
            <input type="number" id="c_closed_price" placeholder="0.00" step="any" oninput="calcClosePnL()">
          </div>
        </div>
      </div>

      <!-- PnL -->
      <div class="form-section accent-border">
        <div class="section-title">💰 PnL — расчёт</div>
        <div class="form-grid form-grid-4">
          <div class="form-group">
            <label>Entry (из Entry вкладки)</label>
            <input type="number" id="c_entry_ref" placeholder="0.00" step="any" oninput="calcClosePnL()">
          </div>
          <div class="form-group">
            <label>Stop Loss (из Entry)</label>
            <input type="number" id="c_sl_ref" placeholder="0.00" step="any" oninput="calcClosePnL()">
          </div>
          <div class="form-group">
            <label>PnL — авто (в единицах цены)</label>
            <input type="text" id="c_pnl" class="auto-field" readonly placeholder="Авто">
          </div>
        </div>
      </div>

      <!-- Analysis -->
      <div class="form-section accent-border">
        <div class="section-title">📸 Графики закрытия</div>
        <div class="form-grid form-grid-2">
          <div class="form-group">
            <label>HTF close</label>
            <input type="text" id="c_htf_close" placeholder="Ссылка на скриншот HTF close">
          </div>
          <div class="form-group">
            <label>LTF close</label>
            <input type="text" id="c_ltf_close" placeholder="Ссылка на скриншот LTF close">
          </div>
        </div>
      </div>

      <div class="form-section accent-border">
        <div class="section-title">💭 Рефлексия</div>
        <div class="form-grid form-grid-2">
          <div class="form-group">
            <label>Что привело к такому решению?</label>
            <textarea id="c_what_led" placeholder="Причина решения" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label>Как надо было действовать?</label>
            <textarea id="c_how_should" placeholder="Правильный сценарий" rows="3"></textarea>
          </div>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-secondary" onclick="resetCloseForm()">🔄 Сбросить Close</button>
        <button class="btn btn-primary btn-lg" onclick="submitBacktestClose()">
          <span id="closeSubmitText">💾 Сохранить Close</span>
          <span id="closeSpinner" style="display:none" class="spinner"></span>
        </button>
      </div>

    </div> <!-- /closeTab -->
  </div> <!-- /formView -->

  <!-- ANALYTICS VIEW -->
  <div id="analyticsView" class="tab-view">
    <div class="card">
      <div class="card-title">📊 История Backtest</div>
      <div id="analyticsContent">
        <div style="text-align:center;padding:32px;color:var(--text2)">⏳ Загрузка...</div>
      </div>
    </div>
  </div>

</main>

<!-- EDIT MODAL -->
<div class="modal-overlay hidden" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h3 style="font-family:var(--font-head)">✏️ Редактирование бэктест-сделки</h3>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div id="editModalContent"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeEditModal()">Отмена</button>
      <button class="btn btn-primary" onclick="saveEdit()">💾 Сохранить</button>
    </div>
  </div>
</div>

<script>
window.addEventListener('load', () => {
  initTheme();
  document.getElementById('navbarContainer').innerHTML = renderNavbar('backtest', '#9382fa');
  updateThemeButton(localStorage.getItem('journal-theme') || 'dark');
  setupRadios();

  // Set default datetime
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const ts = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
  document.getElementById('e_time').value = ts;

  const days = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  document.getElementById('e_day').value = days[now.getDay()];
});

function setupRadios() {
  document.querySelectorAll('.radio-option input[type="radio"]').forEach(input => {
    input.addEventListener('change', function() {
      const group = this.closest('.radio-group');
      if (!group) return;
      group.querySelectorAll('.radio-option').forEach(opt => opt.classList.remove('selected'));
      this.closest('.radio-option').classList.add('selected');
      const otherInput = group.querySelector('.other-input');
      if (otherInput) {
        otherInput.classList.toggle('visible', this.value === 'Другое');
      }
    });
  });
}

function showTab(tabId, btn) {
  document.querySelectorAll('.tab-bar:first-of-type .tab-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['formView','analyticsView'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  if (tabId === 'analyticsView') loadAnalytics();
}

function showFormTab(tabId, btn) {
  ['tabEntryBtn','tabCloseBtn'].forEach(id => document.getElementById(id).classList.remove('active'));
  btn.classList.add('active');
  ['entryTab','closeTab'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });
  document.getElementById(tabId).classList.add('active');
}

// ---- RR CALC ----
function calcRR() {
  const sl = parseFloat(document.getElementById('e_sl').value);
  const entry = parseFloat(document.getElementById('e_entry').value);
  const target = parseFloat(document.getElementById('e_target').value);

  const display = document.getElementById('e_rr_display');
  const badge = document.getElementById('e_direction_badge');

  if (isNaN(sl) || isNaN(entry) || isNaN(target)) {
    display.textContent = '—';
    document.getElementById('e_rr').value = '';
    badge.innerHTML = `<span class="direction-badge" style="background:var(--bg3);color:var(--text2);border:1px solid var(--border)">— Ожидание данных —</span>`;
    return;
  }

  const risk = Math.abs(entry - sl);
  const reward = Math.abs(target - entry);
  const rr = risk > 0 ? (reward / risk) : 0;
  const rrStr = rr.toFixed(2);
  display.textContent = `1:${rrStr}`;
  document.getElementById('e_rr').value = rrStr;

  // Direction
  const isLong = entry > sl;
  badge.innerHTML = `<span class="direction-badge direction-${isLong?'long':'short'}">${isLong?'▲ Long':'▼ Short'}</span>`;
}

// ---- PnL CALC (CLOSE) ----
function calcClosePnL() {
  const entry = parseFloat(document.getElementById('c_entry_ref').value);
  const sl = parseFloat(document.getElementById('c_sl_ref').value);
  const closedPrice = parseFloat(document.getElementById('c_closed_price').value);

  const pnlEl = document.getElementById('c_pnl');

  if (isNaN(entry) || isNaN(closedPrice)) {
    pnlEl.value = '';
    pnlEl.style.color = '';
    return;
  }

  const isLong = !isNaN(sl) ? entry > sl : true;
  const pnl = isLong ? (closedPrice - entry) : (entry - closedPrice);
  const rr_pnl = !isNaN(sl) && Math.abs(entry - sl) > 0 ? (pnl / Math.abs(entry - sl)) : null;

  pnlEl.value = pnl.toFixed(4) + (rr_pnl !== null ? ` (${rr_pnl.toFixed(2)}R)` : '');
  pnlEl.style.color = pnl >= 0 ? '#00c853' : '#e53935';
}

// ---- GET RADIO ----
function getRadio(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  if (!el) return '';
  if (el.value === 'Другое') {
    const otherId = name + '_other';
    const other = document.getElementById(otherId);
    return other ? other.value : 'Другое';
  }
  return el.value;
}

// ---- SUBMIT ENTRY ----
async function submitBacktestEntry() {
  const req = [
    { id: 'e_day', label: 'День недели' },
    { id: 'e_time', label: 'Время' },
    { id: 'e_sl', label: 'Stop loss' },
    { id: 'e_entry', label: 'Entry' },
    { id: 'e_target', label: 'Target' },
    { id: 'e_htf_chart', label: 'HTF График' },
    { id: 'e_ltf_chart', label: 'LTF График' },
  ];
  for (const r of req) {
    if (!document.getElementById(r.id)?.value?.trim()) {
      showToast(`Заполните: ${r.label}`, 'error'); return;
    }
  }
  if (!getRadio('e_structure')) { showToast('Выберите Структуру', 'error'); return; }
  if (!getRadio('e_htfpoi')) { showToast('Выберите HTF POI', 'error'); return; }
  if (!getRadio('e_ltfentry')) { showToast('Выберите LTF Entry', 'error'); return; }
  if (!getRadio('e_ticker')) { showToast('Выберите Тикер', 'error'); return; }

  const row = [
    formatDateTime(new Date(document.getElementById('e_time').value)),
    document.getElementById('e_day').value,
    getRadio('e_session'),
    getRadio('e_structure'),
    getRadio('e_htfpoi'),
    getRadio('e_ltfentry'),
    getRadio('e_ticker'),
    getRadio('e_bos'),
    document.getElementById('e_sl').value,
    document.getElementById('e_entry').value,
    document.getElementById('e_target').value,
    document.getElementById('e_rr').value,
    document.getElementById('e_htf_chart').value,
    document.getElementById('e_ltf_chart').value,
    '', '', '', '', '', '', // Close fields empty
  ];

  await saveBacktest(row, 'entrySubmitText', 'entrySpinner');
}

// ---- SUBMIT CLOSE ----
async function submitBacktestClose() {
  const row = [
    '', '', '', '', '', '', '', '', '', '', '', '', '', '', // Entry fields empty
    formatDateTime(new Date(document.getElementById('c_exit_time').value || Date.now())),
    getRadio('c_result'),
    document.getElementById('c_closed_price').value,
    document.getElementById('c_pnl').value,
    document.getElementById('c_htf_close').value,
    document.getElementById('c_ltf_close').value,
    document.getElementById('c_what_led').value,
    document.getElementById('c_how_should').value,
  ];

  await saveBacktest(row, 'closeSubmitText', 'closeSpinner');
}

async function saveBacktest(row, textId, spinnerId) {
  document.getElementById(textId).style.display = 'none';
  document.getElementById(spinnerId).style.display = 'inline-block';

  try {
    await appendRow(CONFIG.SHEETS.BACKTESTS, row);
    showToast('✅ Данные сохранены!', 'success');
  } catch(e) {
    showToast('❌ Ошибка сохранения', 'error');
  } finally {
    document.getElementById(textId).style.display = 'inline';
    document.getElementById(spinnerId).style.display = 'none';
  }
}

function resetEntryForm() {
  if (!confirm('Сбросить поля Entry?')) return;
  ['e_sl','e_entry','e_target','e_htf_chart','e_ltf_chart'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  document.querySelectorAll('#entryTab input[type="radio"]').forEach(r => r.checked = false);
  document.querySelectorAll('#entryTab .radio-option').forEach(o => o.classList.remove('selected'));
  document.getElementById('e_rr_display').textContent = '—';
}

function resetCloseForm() {
  if (!confirm('Сбросить поля Close?')) return;
  ['c_exit_time','c_closed_price','c_entry_ref','c_sl_ref','c_pnl','c_htf_close','c_ltf_close','c_what_led','c_how_should'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  document.querySelectorAll('#closeTab input[type="radio"]').forEach(r => r.checked = false);
  document.querySelectorAll('#closeTab .radio-option').forEach(o => o.classList.remove('selected'));
}

// ---- ANALYTICS ----
let analyticsData = null;
async function loadAnalytics() {
  if (analyticsData) { renderAnalytics(analyticsData); return; }
  try {
    const res = await getRows(CONFIG.SHEETS.BACKTESTS);
    analyticsData = res;
    renderAnalytics(res);
  } catch(e) {
    document.getElementById('analyticsContent').innerHTML = '<div class="empty-state"><p>Ошибка загрузки</p></div>';
  }
}

function renderAnalytics(data) {
  const { headers, rows } = data;
  if (!rows || rows.length === 0) {
    document.getElementById('analyticsContent').innerHTML = `<div class="empty-state"><div class="icon">🔬</div><h3>Нет бэктест-сделок</h3><p>Заполните форму Backtest</p></div>`;
    return;
  }

  let html = `<div style="overflow-x:auto"><table class="data-table"><thead><tr>
    ${headers.map(h => `<th>${h}</th>`).join('')}<th>Действия</th>
  </tr></thead><tbody>`;

  rows.forEach(r => {
    const pnlIdx = headers.indexOf('PnL');
    let rowHtml = r.data.map((v, i) => {
      if (i === pnlIdx && v !== '') {
        const n = parseFloat(v);
        return `<td class="${!isNaN(n) ? (n>=0 ? 'pnl-positive' : 'pnl-negative') : ''}">${v}</td>`;
      }
      return `<td>${v ?? ''}</td>`;
    }).join('');
    html += `<tr>${rowHtml}<td>
      <button class="btn btn-secondary btn-sm" onclick="openEditRow(${r.rowIndex})">✏️</button>
    </td></tr>`;
  });

  html += '</tbody></table></div>';
  document.getElementById('analyticsContent').innerHTML = html;
}

let editRowIndex = null;
function openEditRow(rowIndex) {
  editRowIndex = rowIndex;
  const row = analyticsData.rows.find(r => r.rowIndex === rowIndex);
  if (!row) return;
  let html = '<div style="max-height:400px;overflow-y:auto">';
  analyticsData.headers.forEach((h, i) => {
    html += `<div class="form-group" style="margin-bottom:10px">
      <label>${h}</label>
      <input type="text" id="edit_col_${i}" value="${row.data[i] || ''}">
    </div>`;
  });
  html += '</div>';
  document.getElementById('editModalContent').innerHTML = html;
  document.getElementById('editModal').classList.remove('hidden');
}

async function saveEdit() {
  if (!editRowIndex) return;
  const row = analyticsData.headers.map((h, i) => document.getElementById(`edit_col_${i}`)?.value || '');
  try {
    await updateRow(CONFIG.SHEETS.BACKTESTS, editRowIndex, row);
    showToast('✅ Обновлено!', 'success');
    closeEditModal();
    analyticsData = null;
    loadAnalytics();
  } catch(e) {
    showToast('❌ Ошибка обновления', 'error');
  }
}

function closeEditModal() {
  document.getElementById('editModal').classList.add('hidden');
  editRowIndex = null;
}
</script>
