<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trader Journal</title>
<link rel="stylesheet" href="shared.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root { --accent: var(--accent-index); }

/* ---- Login Screen ---- */
#loginScreen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}

.login-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 40px 36px;
  width: 100%; max-width: 380px;
  box-shadow: var(--shadow-lg);
  text-align: center;
}

.login-logo {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, #4587f3, #9382fa);
  border-radius: 16px;
  margin: 0 auto 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
}

.login-title {
  font-size: 22px; font-weight: 800;
  color: var(--text); margin-bottom: 6px;
}

.login-sub {
  font-size: 13px; color: var(--text-secondary);
  margin-bottom: 28px;
}

.login-input-wrap { position: relative; margin-bottom: 16px; }

.login-input {
  width: 100%; padding: 12px 44px 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-input);
  color: var(--text);
  font-size: 15px;
  font-family: var(--font-main);
  outline: none;
  transition: border-color 0.2s;
  text-align: center; letter-spacing: 2px;
}

.login-input:focus { border-color: #4587f3; }

.login-error {
  color: #ef4444; font-size: 13px;
  margin-bottom: 12px; min-height: 20px;
}

/* ---- Main App ---- */
#app { display: none; }

/* Top Bar Index */
.top-bar { --accent: #4587f3; }

/* Hero */
.hero {
  text-align: center;
  padding: 32px 16px 16px;
}

.hero-title {
  font-size: clamp(24px, 5vw, 36px);
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.02em;
  margin-bottom: 8px;
}

.hero-sub {
  font-size: 14px; color: var(--text-secondary);
  margin-bottom: 24px;
}

/* Form Links */
.form-links {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 32px;
}

.form-link-card {
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px;
  text-align: center;
  text-decoration: none;
  color: var(--text);
  transition: all 0.25s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  box-shadow: var(--shadow);
}

.form-link-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
}

.form-link-icon {
  width: 48px; height: 48px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  color: white;
}

.form-link-name {
  font-size: 15px; font-weight: 700;
}

.form-link-desc {
  font-size: 12px; color: var(--text-secondary);
}

.daily-card:hover { border-color: var(--accent-daily); }
.daily-card .form-link-icon { background: var(--accent-daily); }

.deal-card:hover { border-color: var(--accent-deal); }
.deal-card .form-link-icon { background: var(--accent-deal); }

.backtest-card:hover { border-color: var(--accent-backtest); }
.backtest-card .form-link-icon { background: var(--accent-backtest); }

/* Charts */
.charts-section-title {
  font-size: 18px; font-weight: 800;
  color: var(--text);
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
}

.period-tabs {
  display: flex; gap: 4px;
  margin-bottom: 16px;
}

.period-btn {
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 12px; font-weight: 700;
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-main);
}

.period-btn.active, .period-btn:hover {
  background: #4587f3;
  color: white;
  border-color: #4587f3;
}

.chart-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 16px;
}

.chart-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
}

.chart-card-title {
  font-size: 13px; font-weight: 700;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}

.chart-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  display: inline-block;
}

.chart-wrap {
  position: relative; height: 160px;
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">📊</div>
    <div class="login-title">Trader Journal</div>
    <div class="login-sub">Введите пароль для доступа</div>
    <div class="login-input-wrap">
      <input type="password" id="pwdInput" class="login-input" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="btn btn-primary" id="loginBtn" style="margin-top:4px">Войти</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- Top Bar -->
  <div class="top-bar">
    <a href="index.html" class="top-bar-left">
      <div class="top-bar-logo" style="background:linear-gradient(135deg,#4587f3,#9382fa)">TJ</div>
      <span>Trader Journal</span>
    </a>
    <div class="top-bar-right">
      <a href="daily.html" class="nav-btn">📋 Daily</a>
      <a href="deal.html" class="nav-btn">💼 Deal</a>
      <a href="backtest.html" class="nav-btn">🔬 Backtest</a>
      <a href="#" id="sheetLink" class="nav-btn" target="_blank">📊 Journal</a>
      <button class="theme-toggle" id="themeToggle">🌙</button>
    </div>
  </div>

  <div class="page-content wide">
    <div class="hero">
      <div class="hero-title">📊 Trader Journal</div>
      <div class="hero-sub">Трейдерский журнал · Ежедневный чек-лист · Аналитика сделок</div>
    </div>

    <!-- Form Links -->
    <div class="form-links">
      <a href="daily.html" class="form-link-card daily-card">
        <div class="form-link-icon">📋</div>
        <div class="form-link-name">Daily</div>
        <div class="form-link-desc">Ежедневный чек-лист</div>
      </a>
      <a href="deal.html" class="form-link-card deal-card">
        <div class="form-link-icon">💼</div>
        <div class="form-link-name">Deal</div>
        <div class="form-link-desc">Журнал сделок</div>
      </a>
      <a href="backtest.html" class="form-link-card backtest-card">
        <div class="form-link-icon">🔬</div>
        <div class="form-link-name">Backtest</div>
        <div class="form-link-desc">Бэктест сделок</div>
      </a>
    </div>

    <!-- Period Selector -->
    <div class="charts-section-title">
      📈 Балансы счетов
      <div class="period-tabs" id="periodTabs">
        <button class="period-btn" data-days="7">7 дней</button>
        <button class="period-btn active" data-days="30">1 месяц</button>
        <button class="period-btn" data-days="365">1 год</button>
        <button class="period-btn" data-days="0">Всё время</button>
      </div>
    </div>

    <div id="chartsContainer">
      <div class="loading"><div class="spinner"></div> Загрузка данных...</div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
// Config
document.getElementById('sheetLink').href = CONFIG.SHEET_URL;

// ---- LOGIN ----
const loginScreen = document.getElementById('loginScreen');
const appEl = document.getElementById('app');

function tryLogin() {
  const pwd = document.getElementById('pwdInput').value;
  if (pwd === CONFIG.PASSWORD) {
    loginScreen.style.display = 'none';
    appEl.style.display = 'block';
    setAuth();
    loadCharts(30);
  } else {
    document.getElementById('loginError').textContent = 'Неверный пароль';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}

document.getElementById('loginBtn').addEventListener('click', tryLogin);
document.getElementById('pwdInput').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

// Check if already logged in
if (sessionStorage.getItem('journal-auth')) {
  loginScreen.style.display = 'none';
  appEl.style.display = 'block';
  loadCharts(30);
}

document.getElementById('pwdInput').focus();

// ---- CHARTS ----
const ACCOUNTS = [
  { key: 'А Финам',  col: 'А Финам',  color: '#c65454' },
  { key: 'С Финам',  col: 'С Финам',  color: '#931c10' },
  { key: 'A Bybit',  col: 'A Bybit',  color: '#ff7f27' },
  { key: 'С Bybit',  col: 'С Bybit',  color: '#bd5815' },
  { key: 'С Форекс', col: 'С Форекс', color: '#a81fb3' },
  { key: 'J2T',      col: 'J2T',      color: '#4587f3' },
];

let dailyData = null;
let chartInstances = {};
let currentDays = 30;

async function loadCharts(days) {
  currentDays = days;
  const container = document.getElementById('chartsContainer');
  
  if (!dailyData) {
    container.innerHTML = '<div class="loading"><div class="spinner"></div> Загрузка данных...</div>';
    const res = await apiCall('getDaily');
    if (res.error || !res.rows) {
      container.innerHTML = '<div class="loading">⚠️ Нет данных. Настройте Apps Script URL в shared.js</div>';
      return;
    }
    dailyData = res;
  }
  
  renderCharts(days);
}

function filterByDays(rows, days) {
  if (!days || days === 0) return rows;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  return rows.filter(row => {
    const dateStr = String(row['Timestamp'] || row[Object.keys(row)[0]] || '');
    const parts = dateStr.split(/[.\s:]/);
    if (parts.length >= 3) {
      const d = new Date(parts[2], parts[1]-1, parts[0]);
      return d >= cutoff;
    }
    return true;
  });
}

function renderCharts(days) {
  // Destroy old charts
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};
  
  const container = document.getElementById('chartsContainer');
  container.innerHTML = '<div class="chart-grid" id="chartGrid"></div>';
  const grid = document.getElementById('chartGrid');
  
  const rows = filterByDays(dailyData.rows, days);
  const headers = dailyData.headers;
  
  // Reversed for chronological order
  const chronoRows = [...rows].reverse();
  const labels = chronoRows.map(r => {
    const ts = String(r[headers[0]] || '');
    return ts.substring(0, 10);
  });
  
  ACCOUNTS.forEach(acc => {
    // Find column index
    const colIdx = headers.findIndex(h => h === acc.col || h === acc.key || String(h).includes(acc.key));
    if (colIdx === -1) return;
    
    const values = chronoRows.map(r => {
      const v = parseFloat(String(r[headers[colIdx]]).replace(/\s/g,'').replace(',','.'));
      return isNaN(v) ? null : v;
    });
    
    if (values.every(v => v === null)) return;
    
    const card = document.createElement('div');
    card.className = 'chart-card';
    card.innerHTML = `
      <div class="chart-card-title">
        <span class="chart-dot" style="background:${acc.color}"></span>
        ${acc.key}
      </div>
      <div class="chart-wrap"><canvas id="chart_${acc.key.replace(/\s/g,'_')}"></canvas></div>
    `;
    grid.appendChild(card);
    
    const ctx = card.querySelector('canvas').getContext('2d');
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
    const textColor = isDark ? '#9ba3c4' : '#6b7280';
    
    chartInstances[acc.key] = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: values,
          borderColor: acc.color,
          backgroundColor: acc.color + '18',
          tension: 0.4,
          fill: true,
          pointRadius: values.length > 30 ? 0 : 3,
          pointHoverRadius: 5,
          borderWidth: 2,
          spanGaps: true,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => fmt(ctx.parsed.y) + ' ₽'
            }
          }
        },
        scales: {
          x: {
            ticks: { color: textColor, maxTicksLimit: 6, font: { size: 10 } },
            grid: { color: gridColor }
          },
          y: {
            ticks: { color: textColor, font: { size: 10 }, callback: v => fmt(v, 0) },
            grid: { color: gridColor }
          }
        }
      }
    });
  });
  
  if (grid.children.length === 0) {
    container.innerHTML = '<div class="loading">📊 Нет данных за выбранный период. Заполняйте Daily форму!</div>';
  }
}

// Period buttons
document.getElementById('periodTabs').addEventListener('click', e => {
  const btn = e.target.closest('.period-btn');
  if (!btn) return;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const days = parseInt(btn.dataset.days);
  loadCharts(days);
});
</script>
</body>
</html>
